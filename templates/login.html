{% extends "layout.html" %}
{% block content %}
<div class="glass-card">
    <h2 style="margin-bottom: 30px;">Login</h2>
    <form id="lF">
        <input type="text" name="username" placeholder="學號" required>
        <input type="password" name="password" placeholder="密碼" required>
        <button type="submit" class="btn">登入簽到</button>
    </form>
    <div style="margin-top:25px; display:flex; justify-content:space-between;">
        <a href="/register">註冊</a><a href="/forgot_password" style="color:#94a3b8">忘記密碼</a>
    </div>
</div>
<script>
document.getElementById('lF').onsubmit = async (e) => {
    e.preventDefault();
    const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
    const data = await res.json();
    if(data.status==='success') location.href='/';
    else Swal.fire('錯誤', data.message, 'error');
};
</script>
{% endblock %}
