{% extends "layout.html" %}
{% block content %}
<div class="glass-card" style="width: 90%; max-width: 500px; padding: 30px 20px;">
    <div style="font-size: 40px; margin-bottom: 5px;">📊</div>
    <h2 style="margin: 5px 0 10px 0; font-size: 22px;">簽到後台管理系統</h2>
    <p style="color: #94a3b8; font-size: 13px; margin-bottom: 15px;">資二甲 全體簽到歷史紀錄查詢</p>

    <div style="margin-bottom: 15px;">
        <input type="text" id="sk" placeholder="🔍 搜尋姓名、學號或狀態..." onkeyup="searchRow()" style="background: rgba(255,255,255,0.1); color: #fff; padding: 10px; font-size: 14px;">
    </div>

    <div style="max-height: 320px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
        <table class="record-table" id="aT" style="width: 100%; border-collapse: collapse; text-align: center;">
            <thead>
                <tr style="background: rgba(59, 130, 246, 0.2); position: sticky; top: 0; backdrop-filter: blur(5px);">
                    <th style="padding: 10px 4px; border-bottom: 2px solid #3b82f6;">學號</th>
                    <th style="padding: 10px 4px; border-bottom: 2px solid #3b82f6;">姓名</th>
                    <th style="padding: 10px 4px; border-bottom: 2px solid #3b82f6;">日期</th>
                    <th style="padding: 10px 4px; border-bottom: 2px solid #3b82f6;">節次</th>
                    <th style="padding: 10px 4px; border-bottom: 2px solid #3b82f6;">狀態</th>
                </tr>
            </thead>
            <tbody id="tB">
                <tr><td colspan="5" style="padding: 20px; color: #94a3b8;">載入中...</td></tr>
            </tbody>
        </table>
    </div>

    <button class="btn" style="background: rgba(255,255,255,0.1); margin-top: 20px;" onclick="location.href='/'">返回首頁</button>
</div>

<script>
window.onload = async () => {
    try {
        const res = await fetch('/api/all_records');
        const data = await res.json();
        const tbody = document.getElementById('tB');
        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="padding: 20px; color: #94a3b8;">目前尚無紀錄</td></tr>`;
            return;
        }
        tbody.innerHTML = data.map(r => `
            <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);" class="r-row">
                <td style="padding: 10px 4px; font-size:13px;">${r.student_id}</td>
                <td style="padding: 10px 4px; font-weight: bold; font-size:13px;">${r.name}</td>
                <td style="padding: 10px 4px; color: #cbd5e1; font-size:12px;">${r.date}</td>
                <td style="padding: 10px 4px; color: #94a3b8; font-size:12px;">${r.period}</td>
                <td style="padding: 10px 4px; color: ${r.status === '出席' ? '#10b981' : '#f59e0b'}; font-weight: bold; font-size:13px;">${r.status}</td>
            </tr>
        `).join('');
    } catch (e) {
        document.getElementById('tB').innerHTML = `<tr><td colspan="5" style="padding: 20px; color: #ef4444;">載入失敗</td></tr>`;
    }
};

function searchRow() {
    const val = document.getElementById('sk').value.toLowerCase();
    document.querySelectorAll('.r-row').forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(val) ? '' : 'none';
    });
}
</script>
{% endblock %}
