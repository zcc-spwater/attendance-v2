{% extends "layout.html" %}
{% block content %}
<div class="glass-card">
    <div style="font-size: 40px;">📍</div>
    <h2>{{ user_name }}</h2>
    <p id="st">點擊按鈕完成簽到</p>
    <button class="btn" id="lBtn" onclick="doSign()">立即簽到</button>
    <div style="text-align:left; margin-top:20px; background:rgba(0,0,0,0.2); padding:10px; border-radius:10px;">
        <p style="color:#38bdf8; font-weight:bold; margin:0 0 10px 0;">🏆 積分榜</p>
        {% for i in leaderboard[:5] %}
        <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;">
            <span>{{ loop.index }}. {{ i.name }}</span><span>{{ i.score }} pts</span>
        </div>
        {% endfor %}
    </div>
    <a href="/logout" style="display:block; margin-top:20px; color:#ef4444;">登出系統</a>
</div>
<script>
async function doSign() {
    const btn = document.getElementById('lBtn');
    btn.disabled = true; btn.innerText = "定位中...";
    navigator.geolocation.getCurrentPosition(async (p) => {
        const res = await fetch('/submit', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({gps: `${p.coords.latitude},${p.coords.longitude}`}) });
        const data = await res.json();
        if(data.status==='success') Swal.fire('成功', data.message, 'success').then(()=>location.reload());
        else { Swal.fire('失敗', data.message, 'error'); btn.disabled = false; btn.innerText = "重試簽到"; }
    }, () => { Swal.fire('錯誤', '請開啟定位權限', 'error'); btn.disabled = false; }, {enableHighAccuracy:true, timeout:10000, maximumAge:60000});
}
</script>
{% endblock %}
