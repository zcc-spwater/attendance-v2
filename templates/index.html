{% extends "layout.html" %}
{% block content %}
<div class="glass-card">
    <div style="font-size: 40px;">📍</div>
    <h2 style="margin: 10px 0;">{{ user_name }}</h2>
    <p style="color: #94a3b8; font-size: 14px;">點擊按鈕完成簽到</p>
    
    <button class="btn" id="lBtn" onclick="doSign()">立即簽到</button>
    
    <button class="btn" style="background: rgba(255,255,255,0.1); margin-top: 10px;" onclick="showRecords()">歷史紀錄</button>

    <div style="margin-top: 15px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; font-size: 14px; text-align: left;">
        <span style="color: #3b82f6; font-weight: bold;">🏆 積分榜</span>
    </div>

    <button class="btn" style="background: transparent; border: 1px solid #3b82f6; color: #3b82f6; margin-top: 15px;" onclick="window.location.href='/admin'">👑 管理員後台</button>
    
    <a href="/logout" style="display:block; margin-top:25px; color:#ef4444;">登出系統</a>
</div>

<script>
async function doSign() {
    const btn = document.getElementById('lBtn');
    btn.disabled = true; 
    btn.innerText = "定位中...";
    
    navigator.geolocation.getCurrentPosition(async (p) => {
        // 徹底捨棄模板字串，改用傳統字串相加，防範 Jinja2 崩潰
        const gpsString = p.coords.latitude + ',' + p.coords.longitude;
        
        const res = await fetch('/submit', { 
            method: 'POST', 
            headers: {'Content-Type':'application/json'}, 
            body: JSON.stringify({ gps: gpsString }) 
        });
        const data = await res.json();
        
        if (data.status === 'success') {
            Swal.fire('簽到成功', data.message, 'success').then(function() {
                location.reload();
            });
        } else {
            Swal.fire('錯誤', data.message, 'error');
            btn.disabled = false;
            btn.innerText = "立即簽到";
        }
    }, () => { 
        Swal.fire('失敗', '請開啟 GPS 定位', 'error'); 
        btn.disabled = false; 
        btn.innerText = "立即簽到";
    }, {enableHighAccuracy:true});
}

async function showRecords() {
    const res = await fetch('/my_records');
    const data = await res.json();
    
    // 將所有可能與 Jinja2 衝突的反引號與 ${} 結構全數拔除
    let html = "";
    if (data.length > 0) {
        html = '<table class="record-table"><tr><th>日期</th><th>節次</th><th>狀態</th></tr>';
        for (let i = 0; i < data.length; i++) {
            const r = data[i];
            const color = (r.status === '出席') ? '#10b981' : '#f59e0b';
            html += '<tr><td>' + r.date + '</td><td>' + r.period + '</td><td style="color:' + color + '">' + r.status + '</td></tr>';
        }
        html += '</table>';
    } else {
        html = "尚無簽到紀錄";
    }
    
    Swal.fire({ 
        title: '我的紀錄', 
        html: html, 
        background: '#1e293b', 
        color: '#fff', 
        confirmButtonColor: '#3b82f6' 
    });
}
</script>
{% endblock %}
