{% extends "layout.html" %}
{% block content %}
<div class="glass-card">
    <div style="font-size: 40px;">📍</div>
    <h2 style="margin: 10px 0;">{{ user_name }}</h2>
    <p style="color: #94a3b8; font-size: 14px;">點擊按鈕完成簽到</p>
    
    <button class="btn" id="lBtn" onclick="doSign()">立即簽到</button>
    <button class="btn" style="background: rgba(255,255,255,0.1); margin-top: 10px;" onclick="showRecords()">歷史紀錄</button>

    <div style="text-align:left; margin-top:20px; background:rgba(15, 23, 42, 0.5); padding:15px; border-radius:15px;">
        <p style="color:#3b82f6; font-weight:bold; margin:0 0 10px 0; display:flex; align-items:center;">
            <span style="margin-right:5px;">🏆</span> 積分榜
        </p>
        {% for i in leaderboard[:3] %}
        <div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:6px;">
            <span>{{ loop.index }}. {{ i.name }}</span><span style="color:#94a3b8;">{{ i.score }} pts</span>
        </div>
        {% endfor %}
    </div>
    
    <a href="/logout" style="display:block; margin-top:25px; color:#ef4444;">登出系統</a>
</div>

<script>
async function doSign() {
    const btn = document.getElementById('lBtn');
    btn.disabled = true; btn.innerText = "定位中...";
    navigator.geolocation.getCurrentPosition(async (p) => {
        const res = await fetch('/submit', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({gps: `${p.coords.latitude},${p.coords.longitude}`}) });
        const data = await res.json();
        if(data.status==='success') Swal.fire('簽到成功', data.message, 'success').then(()=>location.reload());
        else { Swal.fire('錯誤', data.message, 'error'); btn.disabled = false; btn.innerText = "立即簽到"; }
    }, () => { Swal.fire('失敗', '請開啟 GPS 定位', 'error'); btn.disabled = false; }, {enableHighAccuracy:true});
}

async function showRecords() {
    const res = await fetch('/my_records');
    const data = await res.json();
    let html = data.length ? `<table class="record-table"><tr><th>日期</th><th>節次</th><th>狀態</th></tr>` + 
        data.map(r => `<tr><td>${r.date}</td><td>${r.period}</td><td style="color:${r.status==='出席'?'#10b981':'#f59e0b'}">${r.status}</td></tr>`).join('') + `</table>` 
        : "尚無簽到紀錄";
    Swal.fire({ title: '我的紀錄', html: html, background: '#1e293b', color: '#fff', confirmButtonColor: '#3b82f6' });
}
</script>
{% endblock %}
