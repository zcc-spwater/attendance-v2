<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>註冊 | SmartCheck</title>
    <style>/* 延用 login.html 的 CSS */</style>
</head>
<body>
    <div class="card">
        <h2>📝 會員註冊</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="學號 (作為帳號)" required>
            <input type="password" name="password" placeholder="設定密碼" required>
            <input type="text" name="name" placeholder="真實姓名" required>
            <button type="submit" style="background: #2ecc71;">完成註冊</button>
        </form>
        <a href="/login" style="display:block; margin-top:15px; color:#888; text-decoration:none;">返回登入</a>
    </div>
</body>
</html>
