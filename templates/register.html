{% extends "layout.html" %}
{% block content %}
<div class="glass-card">
    <h2>Login</h2>
    <form id="loginForm">
        <input type="text" name="username" placeholder="學號" required>
        <input type="password" name="password" placeholder="密碼" required>
        <button type="submit" class="btn" id="sBtn">登入系統</button>
    </form>
    <p style="margin-top:20px;"><a href="/register">還沒有帳號？點此註冊</a></p>
</div>
<script>
document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('sBtn');
    btn.disabled = true;
    const res = await fetch('/login', { method: 'POST', body: new FormData(e.target) });
    const data = await res.json();
    if(data.status === 'success') location.href = '/';
    else { Swal.fire('錯誤', data.message, 'error'); btn.disabled = false; }
};
</script>
{% endblock %}
