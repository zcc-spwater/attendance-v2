{% extends "layout.html" %}
{% block content %}
<div class="glass-card">
    <h2>重設密碼</h2>
    <form id="fF">
        <input type="text" name="username" placeholder="輸入學號" required>
        <input type="text" name="name" placeholder="輸入姓名" required>
        <input type="password" name="new_password" placeholder="新密碼" required>
        <button type="submit" class="btn">確認修改</button>
    </form>
    <a href="/login" style="display:block; margin-top:20px;">返回</a>
</div>
<script>
document.getElementById('fF').onsubmit = async (e) => {
    e.preventDefault();
    const res = await fetch('/forgot_password', { method: 'POST', body: new FormData(e.target) });
    const data = await res.json();
    if(data.status==='success') Swal.fire('成功', '密碼已更新', 'success').then(()=>location.href='/login');
    else Swal.fire('驗證失敗', data.message, 'error');
};
</script>
{% endblock %}
