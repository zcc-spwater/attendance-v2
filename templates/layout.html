<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資二甲簽到系統</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --primary: #3b82f6; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .glass-card { background: var(--card); backdrop-filter: blur(12px); border-radius: 24px; padding: 40px; width: 320px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: none; background: #e2e8f0; color: #1e293b; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        a { color: #3b82f6; text-decoration: none; font-size: 14px; }
        .record-table { width: 100%; font-size: 14px; border-collapse: collapse; margin-top: 10px; }
        .record-table th, .record-table td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>{% block content %}{% endblock %}</body>
</html>
