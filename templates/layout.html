<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #0f172a; --card: rgba(255, 255, 255, 0.06); --primary: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%); }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: #f1f5f9; height: 100vh; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(at 0% 0%, rgba(56,189,248,0.1) 0px, transparent 50%); }
        .glass-card { background: var(--card); backdrop-filter: blur(20px); border-radius: 24px; padding: 30px; width: 90%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.08); color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:disabled { opacity: 0.5; }
        a { color: #38bdf8; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>{% block content %}{% endblock %}</body>
</html>
